<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EV Converter</title>
    <style>
        body {
            font-family: Arial;
            max-width: 800px;
            margin: 40px auto;
            background: #f7f7f7;
        }
        textarea {
            width: 100%;
            height: 150px;
            margin-bottom: 10px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
        }
        .box {
            background: white;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
        }
        .error {
            color: red;
        }
    </style>
</head>
<body>

<h1>Pokémon EV Converter</h1>

<form method="POST">
    <textarea name="input" placeholder="Paste Pokepaste link or team here..."></textarea>
    <br>
    <button type="submit">Convert</button>
</form>

{% if error %}
    <div class="box error">
        {{ error }}
    </div>
{% endif %}

{% if original %}
    <div class="box">
        <h3>Original</h3>
        <pre>{{ original }}</pre>
    </div>
{% endif %}

{% if converted %}
    <div class="box">
        <h3>Converted</h3>
        <pre>{{ converted }}</pre>
    </div>
{% endif %}

</body>
</html>
