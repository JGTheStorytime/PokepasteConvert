<!DOCTYPE html>
<html>
<head>
    <title>EV Converter</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<h1>EV → ChampCalc Converter</h1>

<form method="POST">
    <textarea name="input" placeholder="Paste Pokepaste URL or Showdown text..."></textarea>
    <br>
    <button type="submit">Convert</button>
</form>

{% if error %}
<p class="error">{{ error }}</p>
{% endif %}

<div class="container">
    <div class="box">
        <h2>Original</h2>
        <pre>{{ original }}</pre>
    </div>

    <div class="box">
        <h2>Converted</h2>
        <pre>{{ converted }}</pre>
    </div>
</div>

</body>
</html>
